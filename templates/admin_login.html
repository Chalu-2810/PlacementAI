{% extends 'base.html' %}
{% block title %}Admin Login — PlacementAI{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow border-0 rounded-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
               style="width:64px;height:64px;font-size:1.8rem">
            <i class="fas fa-user-shield"></i>
          </div>
          <h4 class="fw-bold">Admin Login</h4>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required autofocus/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">
            <i class="fas fa-sign-in-alt me-2"></i>Login as Admin
          </button>
        </form>
        <p class="text-center small text-muted mt-3 mb-0">
          <a href="{{ url_for('login') }}">← Student Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
