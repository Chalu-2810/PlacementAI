{% extends 'base.html' %}
{% block title %}Login — PlacementAI{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow border-0 rounded-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;font-size:1.8rem">
            <i class="fas fa-graduation-cap"></i>
          </div>
          <h4 class="fw-bold">Welcome Back</h4>
          <p class="text-muted small">Login to your PlacementAI account</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>
        <hr class="my-3"/>
        <p class="text-center text-muted small mb-0">
          New here? <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Create an account</a>
        </p>
        <p class="text-center small mt-2">
          <a href="{{ url_for('admin_login') }}" class="text-secondary">Admin Login →</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
