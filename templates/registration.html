{% extends 'base.html' %}
{% block title %}Register — PlacementAI{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow border-0 rounded-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;font-size:1.8rem">
            <i class="fas fa-user-plus"></i>
          </div>
          <h4 class="fw-bold">Create Your Account</h4>
          <p class="text-muted small">Join PlacementAI to get your personalized prediction</p>
        </div>
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="full_name" class="form-control" placeholder="e.g. Arjun Kumar"
                     value="{{ data.full_name if data else '' }}" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="you@college.edu"
                     value="{{ data.email if data else '' }}" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Register / Roll No.</label>
              <input type="text" name="register_no" class="form-control" placeholder="21CS001"
                     value="{{ data.register_no if data else '' }}" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Department</label>
              <input type="text" name="department" class="form-control" placeholder="Computer Science"
                     value="{{ data.department if data else '' }}" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Batch Year</label>
              <input type="number" name="batch_year" class="form-control" placeholder="2025"
                     min="2020" max="2030" value="{{ data.batch_year if data else '2025' }}" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/>
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2 fw-bold mt-4">
            <i class="fas fa-user-plus me-2"></i>Register Now
          </button>
        </form>
        <hr class="my-3"/>
        <p class="text-center text-muted small mb-0">
          Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
